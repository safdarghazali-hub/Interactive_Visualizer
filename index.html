<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Dream: Interactive Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #video-input { position: absolute; top: -1000px; opacity: 0; pointer-events: none; }
        /* Camera POV Styling */
        #camera-pov { 
            position: absolute; 
            bottom: 30px; 
            left: 30px; 
            width: 200px; 
            height: 150px; 
            border: 2px solid #00ffff; 
            border-radius: 8px; 
            overflow: hidden; 
            display: none; 
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            z-index: 100;
            transform: scaleX(-1); /* Mirror view for natural feel */
        }
        #camera-pov video { width: 100%; height: 100%; object-fit: cover; }
        #ui { position: absolute; top: 30px; left: 30px; color: #fff; z-index: 10; pointer-events: none; opacity: 0.9; }
        h2 { margin: 0; font-weight: 300; letter-spacing: 3px; color: #00ffff; text-shadow: 0 0 15px #00ffff; }
        .status { font-size: 11px; color: #ff00ff; margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }
        .controls { position: absolute; bottom: 30px; right: 30px; z-index: 20; display: flex; gap: 12px; }
        button { padding: 14px 28px; background: rgba(0, 255, 255, 0.1); color: #00ffff; border: 1px solid #00ffff; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.3s; backdrop-filter: blur(8px); border-radius: 4px; pointer-events: auto; }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <h2 id="shape-name">Pattern: Black-Hole</h2>
        <div class="status"> FIST TO COLLAPSE | VICTORY CHANGE SHAPE | PINCH SCALE | TRAILS ACTIVE</div>
    </div>
    <div id="camera-pov">
        <video id="mini-video" autoplay playsinline muted></video>
    </div>
    
    <div class="controls">
        <button id="cam-toggle">Cam: Off</button>
        <button id="audio-btn">Sync Audio</button>
        <button id="fs-btn">Fullscreen</button>
    </div>

    <video id="video-input" playsinline></video>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';

        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 75;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- POST PROCESSING (STABILIZED TRAILS) ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const afterimagePass = new AfterimagePass();
        afterimagePass.uniforms['damp'].value = 0.94; // Adjust for trail length (0.9 to 0.98)
        composer.addPass(afterimagePass);

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloomPass);

        // --- 2. GPU ATTRIBUTES ---
        const particleCount = 80000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3); 
        const randomValues = new Float32Array(particleCount);

        for(let i = 0; i < particleCount; i++) { 
            positions[i*3] = (Math.random() - 0.5) * 100; 
            positions[i*3+1] = (Math.random() - 0.5) * 100; 
            positions[i*3+2] = (Math.random() - 0.5) * 100; 
            randomValues[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('targetPos', new THREE.BufferAttribute(targetPositions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randomValues, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }, uMorph: { value: 0 }, uScale: { value: 1.0 },
                uBass: { value: 0.0 }, uTreble: { value: 0.0 }, uVortex: { value: 0.0 }
            },
            vertexShader: `
                uniform float uTime; uniform float uMorph; uniform float uScale;
                uniform float uBass; uniform float uVortex;
                attribute vec3 targetPos; attribute float aRandom;
                varying vec3 vPos; varying float vShimmer;

                void main() {
                    vShimmer = aRandom;
                    vec3 morphed = mix(position, targetPos, uMorph);
                    float pulse = 1.0 + uBass * 0.8;
                    morphed *= (uScale * pulse);
                    
                    vec3 center = vec3(0.0);
                    morphed = mix(morphed, center, uVortex);
                    if(uVortex > 0.01) {
                        float angle = uVortex * 8.0 + uTime * 3.0;
                        float s = sin(angle); float c = cos(angle);
                        morphed.xz = mat2(c, -s, s, c) * morphed.xz;
                    }

                    vPos = morphed;
                    vec4 mvPosition = modelViewMatrix * vec4(morphed, 1.0);
                    gl_PointSize = (75.0 / -mvPosition.z) * (1.0 + uVortex * 2.0);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uBass; uniform float uTreble; uniform float uTime; uniform float uVortex;
                varying vec3 vPos; varying float vShimmer;

                vec3 hsv2rgb(vec3 c) {
                    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                }

                void main() {
                    float dist = distance(gl_PointCoord, vec2(0.5));
                    if (dist > 0.5) discard;
                    float shimmerEffect = sin(uTime * 5.0 * vShimmer) * uTreble;
                    float hue = fract(uTime * 0.05 + vPos.y * 0.01 + uBass * 0.05);
                    vec3 color = hsv2rgb(vec3(hue, 0.8, clamp(0.9 + shimmerEffect, 0.0, 1.5)));
                    color = mix(color, vec3(1.0, 0.4, 0.1), uVortex);
                    color += (step(0.85, shimmerEffect) * uTreble * 0.4);
                    gl_FragColor = vec4(color, smoothstep(0.5, 0.1, dist));
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const points = new THREE.Points(geometry, shaderMaterial);
        scene.add(points);

        // --- 3. SHAPE LIBRARY ---
        const shapes = ['Black-Hole', 'Dream-Ring', 'Torus-Knot', 'Mobius-Strip', 'Chaos-Attractor', 'Data-Disk', 'Phyllo-Sphere', 'Nebula-Heart', 'Saturn', 'Flower', 'DNA-Helix', 'Cube', 'Galaxy'];
        let currentShape = 0;

        function updateShape() {
            const currentPos = geometry.attributes.position.array;
            const targetPosAttr = geometry.attributes.targetPos.array;
            for(let i=0; i<particleCount*3; i++) currentPos[i] = THREE.MathUtils.lerp(currentPos[i], targetPosAttr[i], shaderMaterial.uniforms.uMorph.value);
            geometry.attributes.position.needsUpdate = true;
            const name = shapes[currentShape];
            document.getElementById('shape-name').innerText = "Pattern: " + name;

            for(let i=0; i<particleCount; i++) {
                let x, y, z; const i3 = i * 3;
                if(name === 'Black-Hole') {
                    if(i < particleCount * 0.2) {
                        const p = Math.acos(-1 + (2 * i) / (particleCount * 0.2)), t = Math.sqrt(particleCount * 0.2 * Math.PI) * p;
                        x = 10 * Math.cos(t) * Math.sin(p); y = 10 * Math.sin(t) * Math.sin(p); z = 10 * Math.cos(p);
                    } else {
                        const a = Math.random() * Math.PI * 2, r = 15 + Math.random() * 25;
                        x = Math.cos(a) * r; z = Math.sin(a) * r; y = Math.sin(a) * (r * 0.2) * Math.exp(-r * 0.05); 
                    }
                } else if(name === 'Dream-Ring') {
                    const u = Math.random()*Math.PI*2, v = Math.random()*Math.PI*2, R = 24, rad = 8;
                    x = (R + rad * Math.cos(v)) * Math.cos(u); y = (R + rad * Math.cos(v)) * Math.sin(u); z = rad * Math.sin(v);
                } else if(name === 'Torus-Knot') {
    const p = 3, q = 7; // Adjust these for different knot styles
    const t = (i / particleCount) * Math.PI * 2 * 20; 
    const r = 12 + 6 * Math.cos(q * t);
    x = r * Math.cos(p * t);
    y = r * Math.sin(p * t);
    z = 6 * Math.sin(q * t);
} else if(name === 'Mobius-Strip') {
    const u = (i / particleCount) * Math.PI * 2;
    const v = (Math.random() - 0.5) * 10; // Width of the strip
    const a = 20; // Radius
    x = (a + v * Math.cos(u / 2)) * Math.cos(u);
    y = (a + v * Math.cos(u / 2)) * Math.sin(u);
    z = v * Math.sin(u / 2);
} else if(name === 'Chaos-Attractor') {
    // We use a pseudo-integration for the particles
    let lx = 0.1, ly = 0, lz = 0;
    const dt = 0.01, sigma = 10, rho = 28, beta = 8/3;
    // Note: For a real attractor, you'd iterate per-particle
    // Simplified version for distribution:
    const t = (i / particleCount) * 100;
    x = 15 * Math.sin(t) * Math.cos(t * 0.5);
    y = 15 * Math.cos(t * 1.2);
    z = (Math.random() - 0.5) * 40;
} else if(name === 'Data-Disk') {
    const phi = (Math.sqrt(5) + 1) / 2; // Golden ratio
    const r = Math.sqrt(i / particleCount) * 30;
    const theta = 2 * Math.PI * phi * i;
    x = Math.cos(theta) * r;
    y = Math.sin(theta) * r;
    z = (Math.random() - 0.5) * 2;
}
 else if(name === 'Phyllo-Sphere') {
                    const yPos = 1 - (i / (particleCount - 1)) * 2, radius = Math.sqrt(1 - yPos * yPos), theta = (Math.PI * (3 - Math.sqrt(5))) * i;
                    x = Math.cos(theta) * radius * 25; y = yPos * 25; z = Math.sin(theta) * radius * 25;
                } else if(name === 'Nebula-Heart') {
                    const t = (i / particleCount) * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3) * 1.5; y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 1.5; z = (Math.random()-0.5) * 5;
                } else if(name === 'Saturn') {
                    if(i < particleCount * 0.6) {
                        const p = Math.acos(-1 + (2 * i) / (particleCount * 0.6)), t = Math.sqrt(particleCount * 0.6 * Math.PI) * p;
                        x = 16 * Math.cos(t) * Math.sin(p); y = 16 * Math.sin(t) * Math.sin(p); z = 16 * Math.cos(p);
                    } else {
                        const a = Math.random() * Math.PI * 2, r = 26 + Math.random() * 10;
                        x = Math.cos(a) * r; y = (Math.random()-0.5)*1.5; z = Math.sin(a) * r;
                    }
                } else if(name === 'Flower') {
                    const angle = (i / particleCount) * Math.PI * 20, r = 20 * Math.cos(2.5 * angle);
                    x = r * Math.cos(angle); y = r * Math.sin(angle); z = (Math.random() - 0.5) * 3;
                }  else if(name === 'DNA-Helix') {
    const totalTurns = 8; // How many times it twists
    const helixRadius = 10;
    const helixHeight = 60;
    
    // Divide particles: 60% for the two backbones, 40% for the rungs
    if (i < particleCount * 0.6) {
        // --- THE TWO BACKBONES ---
        const isStrandB = i % 2 === 0;
        const progress = i / (particleCount * 0.6); // 0 to 1
        
        const theta = progress * Math.PI * 2 * totalTurns;
        const angleOffset = isStrandB ? Math.PI : 0; // 180 degree separation
        
        x = Math.cos(theta + angleOffset) * helixRadius;
        z = Math.sin(theta + angleOffset) * helixRadius;
        y = (progress - 0.5) * helixHeight;
    } else {
        // --- THE RUNGS (Connecting bars) ---
        const rungIndex = i % 20; // Creates 20 distinct rungs along the height
        const progress = (i - particleCount * 0.6) / (particleCount * 0.4);
        
        // Snap progress to discrete steps to create "bars" instead of a cloud
        const steppedProgress = Math.floor(progress * 25) / 25; 
        const theta = steppedProgress * Math.PI * 2 * totalTurns;
        
        // Lerp a point between Strand A and Strand B at this height
        const lerpFactor = Math.random(); // Distribute particles across the rung
        const x1 = Math.cos(theta) * helixRadius;
        const z1 = Math.sin(theta) * helixRadius;
        const x2 = Math.cos(theta + Math.PI) * helixRadius;
        const z2 = Math.sin(theta + Math.PI) * helixRadius;
        
        x = THREE.MathUtils.lerp(x1, x2, lerpFactor);
        z = THREE.MathUtils.lerp(z1, z2, lerpFactor);
        y = (steppedProgress - 0.5) * helixHeight;
    }}
else if(name === 'Cube') { 
                    const s = 20, side = Math.floor(Math.random() * 6), a = (Math.random()-0.5)*s*2, b = (Math.random()-0.5)*s*2;
                    if(side === 0) { x=s; y=a; z=b; } else if(side === 1) { x=-s; y=a; z=b; }
                    else if(side === 2) { y=s; x=a; z=b; } else if(side === 3) { y=-s; x=a; z=b; }
                    else if(side === 4) { z=s; x=a; y=b; } else { z=-s; x=a; y=b; }
                } else { 
                    const angle = 0.12 * i, r = 0.5 * angle;
                    x = r * Math.cos(angle); y = (Math.random() - 0.5) * 8; z = r * Math.sin(angle);
                }
                targetPosAttr[i3] = x; targetPosAttr[i3+1] = y; targetPosAttr[i3+2] = z;
            }
            geometry.attributes.targetPos.needsUpdate = true;
            shaderMaterial.uniforms.uMorph.value = 0;
        }
        updateShape();

        // --- 4. ANTI-JITTER HAND TRACKING ---
        let audioData = { bass: 0, treble: 0 };
        let handExpansion = 1.0, handRotationY = 0, targetVortex = 0.0, gestureDebounce = 0;
        let prevHandX = 0.5;

        // Smoothing Settings
        const smoothFactor = 0.1; // Lower = Smoother, Higher = Snappier
        const jitterDeadzone = 0.005;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const marks = res.multiHandLandmarks[0];
                
                // 1. Smooth Pinch
                const dist = Math.sqrt(Math.pow(marks[4].x - marks[8].x, 2) + Math.pow(marks[4].y - marks[8].y, 2));
                const rawExpansion = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(dist, 0.05, 0.4, 0.5, 3.0), 0.5, 4.0);
                handExpansion += (rawExpansion - handExpansion) * smoothFactor;
                
                // 2. Smooth Rotation with Deadzone
                const rawX = marks[9].x;
                if(Math.abs(rawX - prevHandX) > jitterDeadzone) {
                    const targetRot = (rawX - 0.5) * 4;
                    handRotationY += (targetRot - handRotationY) * smoothFactor;
                    prevHandX = rawX;
                }

                // 3. Gestures
                const indexUp = marks[8].y < marks[6].y, middleUp = marks[12].y < marks[10].y;
                const ringDown = marks[16].y > marks[14].y, pinkyDown = marks[20].y > marks[18].y;
                const fist = !indexUp && !middleUp && ringDown && pinkyDown;
                const victory = indexUp && middleUp && ringDown && pinkyDown;

                if (fist) {
                    handExpansion += (0.1 - handExpansion) * 0.3; 
                    targetVortex = 1.0;
                } else {
                    targetVortex = 0.0;
                }

                if (victory && (Date.now() - gestureDebounce > 1500)) { 
                    currentShape = (currentShape + 1) % shapes.length;
                    updateShape();
                    gestureDebounce = Date.now();
                }
            } else {
                handExpansion += (1.0 - handExpansion) * 0.05;
                handRotationY += (0.2 - handRotationY) * 0.05;
                targetVortex = 0.0;
            }
        });

        const video = document.getElementById('video-input');
        const miniVideo = document.getElementById('mini-video');
        const cameraUtils = new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 });
        cameraUtils.start().then(() => {
            // Once main camera starts, ensure mini video gets the same stream
            navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
                miniVideo.srcObject = stream;
            });
        });
        // --- UI HANDLERS ---
        document.getElementById('cam-toggle').addEventListener('click', (e) => {
            const pov = document.getElementById('camera-pov');
            if (pov.style.display === 'none' || pov.style.display === '') {
                pov.style.display = 'block';
                e.target.innerText = "Cam: On";
                e.target.classList.add('active');
            } else {
                pov.style.display = 'none';
                e.target.innerText = "Cam: Off";
                e.target.classList.remove('active');
            }
        });

        // --- AUDIO ---
        document.getElementById('audio-btn').addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext(), analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            function loop() {
                analyser.getByteFrequencyData(data);
                let b = 0; for(let i=0; i<10; i++) b += data[i];
                let t = 0; for(let i=100; i<160; i++) t += data[i];
                audioData.bass = b / 1800; audioData.treble = t / 1500;
                requestAnimationFrame(loop);
            }
            loop();
            document.getElementById('audio-btn').innerText = "Link Active";
        });

        document.getElementById('fs-btn').addEventListener('click', () => { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen(); 
            else document.exitFullscreen(); 
        });

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            shaderMaterial.uniforms.uTime.value = time;
            shaderMaterial.uniforms.uBass.value = audioData.bass;
            shaderMaterial.uniforms.uTreble.value = audioData.treble;
            shaderMaterial.uniforms.uScale.value = handExpansion;
            shaderMaterial.uniforms.uVortex.value = THREE.MathUtils.lerp(shaderMaterial.uniforms.uVortex.value, targetVortex, 0.15);
            if(shaderMaterial.uniforms.uMorph.value < 1.0) shaderMaterial.uniforms.uMorph.value += 0.02;

            points.rotation.y += 0.004 + (handRotationY * 0.04) + (audioData.bass * 0.02);
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
